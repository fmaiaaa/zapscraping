name: Rodar Scraper Zap

on:
  workflow_dispatch: # Isso cria o botão para você rodar manualmente

jobs:
  scrape-e-enviar:
    runs-on: ubuntu-latest
    steps:
      - name: Pegar o código do repositório
        uses: actions/checkout@v3

      - name: Instalar o Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar as bibliotecas
        run: |
          python -m pip install --upgrade pip
          pip install curl_cffi pandas numpy beautifulsoup4 openpyxl tqdm

      - name: Rodar o script e enviar para o n8n
        # Cole a sua URL do Webhook do n8n entre as aspas abaixo:
        run: python scraper.py --n8n-webhook "https://n8n.srv1455528.hstgr.cloud/webhook-test/3e50d82b-3060-40fd-985b-8232fd66ac70"
